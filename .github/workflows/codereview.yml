name: Apply Mailing List Patch

on:
  workflow_dispatch:
    inputs:
      message_id:
        description: 'Patch message ID (e.g. <1234@linux-cifs>)'
        required: true
      author_name:
        description: 'Commit author name (your name)'
        required: true
      author_email:
        description: 'Commit author email (your GitHub email)'
        required: true

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git perl python3-pip gzip
          python3 -m pip install --upgrade pip
          python3 -m pip install --no-cache-dir b4

      - name: Sanitize message ID
        id: sanitize
        run: |
          MSGID="${{ github.event.inputs.message_id }}"
          BRANCH=$(echo "$MSGID" | tr -d '<>' | tr '@.' '-' | tr -cd '[:alnum:]-')
          echo "branch_name=github-reviews-${BRANCH}" >> $GITHUB_OUTPUT

      - name: Prepare branch
        run: |
          git checkout -b ${{ steps.sanitize.outputs.branch_name }}
          echo "BASE_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Configure Git user
        run: |
          git config user.name "${{ github.event.inputs.author_name }}"
          git config user.email "${{ github.event.inputs.author_email }}"

      - name: Apply patch or series
        id: apply_series
        run: |
          set -e
          MSGID='${{ github.event.inputs.message_id }}'
          echo "Attempting to apply series via b4 for message: $MSGID"
          if b4 --version; then
            if b4 am -3 "$MSGID"; then
              echo "applied_mode=series" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "b4 failed, will attempt single-patch fallback"
            fi
          fi

          echo "Falling back to single patch download and apply"
          PATCH_FILE=/tmp/patch.diff
          # Try raw content first
          if curl -fsSL "https://lore.kernel.org/linux-cifs/${{ github.event.inputs.message_id }}/raw" -o "$PATCH_FILE"; then
            if git apply --3way --verbose "$PATCH_FILE"; then
              git add $(git diff --name-only)
              git commit -m "Applied patch from message ID: ${{ github.event.inputs.message_id }}"
              echo "applied_mode=single" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Try thread mbox path as a secondary series method
          echo "Trying thread mbox via lore"
          THREAD_MBOX=/tmp/thread.mbox
          if curl -fsSL "https://lore.kernel.org/r/${{ github.event.inputs.message_id }}/t.mbox.gz" | gunzip > "$THREAD_MBOX"; then
            if git am -3 "$THREAD_MBOX"; then
              echo "applied_mode=series" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "Patch apply failed."
          exit 1

      - name: Run checkpatch.pl
        id: run_checkpatch
        run: |
          set -e
          mkdir -p /tmp/checkpatch
          curl -fsSL https://raw.githubusercontent.com/torvalds/linux/master/scripts/checkpatch.pl -o /tmp/checkpatch/checkpatch.pl
          chmod +x /tmp/checkpatch/checkpatch.pl

          MODE='${{ steps.apply_series.outputs.applied_mode }}'
          echo "Checkpatch mode: $MODE"
          REPORT=/tmp/checkpatch/report.txt
          : > "$REPORT"

          if [ "$MODE" = "single" ]; then
            # For single patch, use the file saved earlier if present; otherwise diff staged changes
            if [ -f /tmp/patch.diff ]; then
              /tmp/checkpatch/checkpatch.pl --no-tree --patch /tmp/patch.diff >> "$REPORT" || true
            else
              git diff --staged > /tmp/patch.diff || true
              /tmp/checkpatch/checkpatch.pl --no-tree --patch /tmp/patch.diff >> "$REPORT" || true
            fi
          else
            # For series, iterate commits introduced on this branch since BASE_SHA
            BASE_SHA=${BASE_SHA}
            COMMITS=$(git rev-list --reverse ${BASE_SHA}..HEAD)
            for c in $COMMITS; do
              echo "=== Commit $c ===" >> "$REPORT"
              git format-patch -1 --stdout $c > /tmp/one.patch
              /tmp/checkpatch/checkpatch.pl --no-tree --patch /tmp/one.patch >> "$REPORT" || true
              echo "" >> "$REPORT"
            done
          fi

          {
            echo "checkpatch<<EOF"
            cat "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push branch
        run: |
          git push https://x-access-token:${{ secrets.PERSONAL_GITHUB_TOKEN }}@github.com/${{ github.repository }} ${{ steps.sanitize.outputs.branch_name }}
          
      - name: Wait for GitHub to register branch
        run: sleep 10
        
      - name: Fetch remote branch
        run: |
          git fetch origin ${{ steps.sanitize.outputs.branch_name }}
      - name: Reset working base branch
        run: |
          git reset --hard origin/${{ steps.sanitize.outputs.branch_name }}

      - name: Create Pull Request via GitHub CLI
        id: create_pr
        run: |
          MODE='${{ steps.apply_series.outputs.applied_mode }}'
          TITLE_PREFIX="Apply patch"
          if [ "$MODE" = "series" ]; then TITLE_PREFIX="Apply patch series"; fi
          PR_URL=$(gh pr create \
            --title "$TITLE_PREFIX ${{ github.event.inputs.message_id }}" \
            --body "Applied via $MODE from message ID: \`${{ github.event.inputs.message_id }}\`" \
            --base for-next \
            --head ${{ steps.sanitize.outputs.branch_name }} \
          )
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=$(echo $PR_URL | grep -oE '[0-9]+$')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

  # (Prior steps: checkout, apply patch/series, push branch, create PR, add Copilot review)

      - name: Wait for Copilot comments
        id: wait_for_copilot_comments
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          script: |
            const prNumber = Number('${{ steps.create_pr.outputs.pr_number }}');
            const delay = ms => new Promise(res => setTimeout(res, ms));
            const maxAttempts = 20;
            const initialDelayMs = 60000; // 60s
            const intervalDelayMs = 30000; // 30s
      
            let attempts = 0;
            let reviewText = "";
            let comments = [];
      
            console.log("Initial wait to give Copilot time to comment...");
            await delay(initialDelayMs);
      
            while (attempts < maxAttempts) {
              const [reviewsResult, commentsResult] = await Promise.all([
                github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                }),
                github.rest.pulls.listReviewComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                })
              ]);
      
              console.log(`Attempt ${attempts + 1}:`);
              console.log("Fetched reviews:", reviewsResult.data.length);
              console.log("Fetched review comments:", commentsResult.data.length);
              console.log("Reviewers:", reviewsResult.data.map(r => r.user?.login).join(', '));
              console.log("Commenters:", commentsResult.data.map(c => c.user?.login).join(', '));
      
              // Check for any of the possible Copilot bot logins
              const copilotReviews = reviewsResult.data.filter(
                r => 
                  (r.user?.login === 'github-copilot[bot]' || 
                  r.user?.login === 'copilot-pull-request-reviewer[bot]' ||
                  r.user?.login === 'Copilot') && r.body
              );
              const copilotReviewComments = commentsResult.data.filter(
                c => 
                  (c.user?.login === 'github-copilot[bot]' || 
                  c.user?.login === 'Copilot' || 
                  c.user?.login === 'copilot-pull-request-reviewer[bot]')
              );
      
              reviewText = copilotReviews.map(r => r.body.trim()).join('\n\n---\n\n');
              comments = copilotReviewComments.map(
                c => `File: ${c.path}\nLine ${c.position || c.line}: ${c.body.trim()}`
              );
      
              if (reviewText || comments.length > 0) break;
      
              console.log(`No Copilot comments found yet. Waiting ${intervalDelayMs / 1000}s...`);
              await delay(intervalDelayMs);
              attempts++;
            }
      
            const combined = []
              .concat(reviewText ? [`**Copilot Review Summary:**\n\n${reviewText}`] : [])
              .concat(comments.length ? [`**Copilot Inline Comments:**\n\n${comments.join('\n\n---\n\n')}`] : []);
      
            const output = combined.join('\n\n\n') || "No Copilot comments received.";
            console.log("Final Output:\n", output);
            core.setOutput("copilotComments", output);


      - name: Send email with PR and Copilot comments
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Copilot reviewed PR for patch ${{ github.event.inputs.message_id }}"
          body: |
            A patch PR has been created and Copilot has provided review comments:
      
            Pull Request: ${{ steps.create_pr.outputs.pr_url }}
      
            **Copilot Comments**:
            ${{ steps.wait_for_copilot_comments.outputs.copilotComments }}
          to: bharath.hsk@gmail.com
          from: 'CP Bot <${{ secrets.EMAIL_USERNAME }}>'
