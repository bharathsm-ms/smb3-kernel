name: Apply Mailing List Patch

on:
  workflow_dispatch:
    inputs:
      message_id:
        description: 'Patch message ID (e.g. <1234@linux-cifs>)'
        required: true

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 10  # Full history for patch application

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git perl

      - name: Sanitize message ID to branch name
        id: sanitize_branch
        run: |
          MSGID="${{ github.event.inputs.message_id }}"
          # Remove angle brackets, special chars, replace with dashes
          SANITIZED=$(echo "$MSGID" | tr -d '<>' | tr '@.' '-' | tr -cd '[:alnum:]-')
          echo "sanitized_branch=github-reviews-${SANITIZED}" >> $GITHUB_OUTPUT

      - name: Fetch patch and prepare branch
        run: |
          MSGID="${{ github.event.inputs.message_id }}"
          PATCH_URL="https://lore.kernel.org/linux-cifs/${MSGID}/raw"
          echo "Downloading patch from $PATCH_URL"
          curl -fsSL "$PATCH_URL" -o patch.diff
          git checkout -b ${{ steps.sanitize_branch.outputs.sanitized_branch }}

      - name: Configure git user for patch application
        run: |
          AUTHOR_NAME=$(grep "^From: " patch.diff | head -1 | sed -E 's/^From: (.*) <.*>$/\1/' || echo "CI Bot")
          AUTHOR_EMAIL=$(grep "^From: " patch.diff | head -1 | sed -E 's/^From: .* <(.*)>$/\1/' || echo "ci-bot@example.com")
          echo "Using git user.name: $AUTHOR_NAME"
          echo "Using git user.email: $AUTHOR_EMAIL"
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"

      - name: Apply patch
        run: |
          if git am --3way --ignore-whitespace patch.diff; then
            echo "Patch applied successfully"
          else
            echo "Failed to apply patch"
            git am --abort
            exit 1
          fi

      - name: Run checkpatch.pl on patch
        run: |
          curl -fsSL https://raw.githubusercontent.com/torvalds/linux/master/scripts/checkpatch.pl -o checkpatch.pl
          chmod +x checkpatch.pl
          ./checkpatch.pl --strict --file=patch.diff

      - name: Push branch to GitHub
        run: |
          git push origin ${{ steps.sanitize_branch.outputs.sanitized_branch }}

      - name: Create Pull Request
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Apply patch ${process.env.MESSAGE_ID}`,
              head: process.env.BRANCH_NAME,
              base: 'for-next',  // Adjust if default branch is different
              body: `Applied patch from mailing list message ID: ${process.env.MESSAGE_ID}`,
            });
            console.log(`Created PR #${pr.data.number}`);
        env:
          MESSAGE_ID: ${{ github.event.inputs.message_id }}
          BRANCH_NAME: ${{ steps.sanitize_branch.outputs.sanitized_branch }}
