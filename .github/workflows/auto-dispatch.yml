name: Auto Fetch and Dispatch Patches

on:
  schedule:
    # run hourly
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Run fetch-and-dispatch script
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 .github/scripts/fetch_and_dispatch.py
